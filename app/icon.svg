<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#7F1D1D"/>

  <!-- Outer marigold petals (4 cardinal) -->
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FBBF24" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FBBF24" transform="rotate(90 16 16)"/>
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FBBF24" transform="rotate(180 16 16)"/>
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FBBF24" transform="rotate(270 16 16)"/>

  <!-- Outer marigold petals (4 diagonal – slightly lighter for depth) -->
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FDE68A" transform="rotate(45 16 16)"/>
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FDE68A" transform="rotate(135 16 16)"/>
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FDE68A" transform="rotate(225 16 16)"/>
  <ellipse cx="16" cy="9" rx="2.4" ry="4" fill="#FDE68A" transform="rotate(315 16 16)"/>

  <!-- Inner petals (8 petals, shorter) -->
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(22.5 16 16)"/>
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(67.5 16 16)"/>
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(112.5 16 16)"/>
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(157.5 16 16)"/>
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(202.5 16 16)"/>
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(247.5 16 16)"/>
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(292.5 16 16)"/>
  <ellipse cx="16" cy="11" rx="1.6" ry="2.8" fill="#F59E0B" transform="rotate(337.5 16 16)"/>

  <!-- Flower center -->
  <circle cx="16" cy="16" r="4.2" fill="#991B1B"/>
  <circle cx="16" cy="16" r="2.6" fill="#FDE68A"/>
  <circle cx="16" cy="16" r="1.2" fill="#B91C1C"/>
</svg>
